name: AREA CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Flake8 (Linter)
        run: |
          flake8 area_backend --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 area_backend --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  mobile-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java (Required for Android build)
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Get Dependencies
        # Remplacez 'area_mobile' par le vrai nom de votre dossier mobile
        working-directory: ./area_mobile 
        run: flutter pub get

      - name: Run Flutter Analyze (Linter)
        working-directory: ./area_mobile
        run: flutter analyze

      - name: Build APK (Release)
        working-directory: ./area_mobile
        run: flutter build apk --release

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-apk
          path: area_mobile/build/app/outputs/flutter-apk/app-release.apk

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, mobile-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create dummy .env file
        run: |
          touch .env
          echo "POSTGRES_USER=test" >> .env
          echo "POSTGRES_PASSWORD=test" >> .env
          echo "POSTGRES_DB=test" >> .env
          echo "DATABASE_URL=postgresql://test:test@db:5432/test" >> .env
          echo "SECRET_KEY=secret" >> .env
          # Ajoutez ici d'autres variables si nécessaire pour que le build passe

      - name: Build Docker Images
        run: docker-compose build